<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Responsive Login</title>

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
    height: 100vh;
}

/* ===== PAGE BACKGROUND ===== */
 .login-wrapper{
  min-height: 100%;
  background-image:  linear-gradient(to right bottom, oklch(95.466% 0.00182 249.199 / 0.81) 0%,
    oklch(48.411% 0.22876 294.263 / 0.334) 25%,
    oklch(95.466% 0.00182 249.199 / 0.81) 100%
    );
   
  display: flex;
  flex-direction: column;
  margin: 0;
  align-items: center;
  justify-content: space-between;
  padding: 20px;
  width: 100%;
}

/* ===== LOGIN CONTAINER ===== */
.login-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 420px;
  margin-top: 4rem;
  margin-bottom: 0;
}

/* ===== LOGIN CARD ===== */
.login-card {
  background: #ffffff;
  padding: 40px 30px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* ===== HEADER ===== */
.login-card h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #333;
}

/* ===== INPUT GROUP ===== */
.input-group {
  margin-bottom: 18px;
}

.input-group label {
  display: block;
  margin-bottom: 6px;
  font-size: 14px;
  color: #555;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 15px;
  transition: 0.3s;
}

.input-group input:focus {
  outline: none;
  border-color: #666;
}

/* ===== BUTTON ===== */
button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 8px;
  background: #444;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #222;
}

/* ===== EXTRA LINKS ===== */
.extra {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
}

.extra a {
  color: #444;
  text-decoration: none;
}

.extra a:hover {
  text-decoration: underline;
}


.signup-box1 {
    display: flex;
    justify-content: center;
     column-gap: 1rem;
     text-align: center;
     margin-top: 2rem;

  
}

.signup-box1 span {
    font-size: 0.8rem;
    line-height: 1.2rem;
    color: rgb(17 24 39 / 1);
    
}

.signup-box1 a {
    font-size: 0.8rem;
    line-height: 1.2rem;
    color: rgb(17 24 39 / 1);
}

.signup-box1 i {
    margin-right: 1rem;
}

/* ===== RESPONSIVE BREAKPOINTS ===== */

/* Tablets */
@media (max-width: 768px) {
  .login-card {
    padding: 30px 20px;
  }
}

/* Small phones */
@media (max-width: 480px) {
  .login-card h2 {
    font-size: 22px;
  }

  button {
    font-size: 15px;
  }
}
</style>
</head>

<body>
<div  class="login-wrapper"> 
<div class="login-container">
  <div class="login-card">
    <h2>Login</h2>

    <form>
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required />
      </div>



      <button type="submit">Sign In</button>

      <div class="extra">
        <p><a href="#">Forgot Password?</a></p>
      </div>
    </form>

  </div>
 
</div>

<div class="signup-box1">
                <span> &copy; 2026 Yabatech Bank. All rights reserved 
                <i></i><Link>Terms of use</Link> 
                <i></i><Link>Privacy Policy</Link> 
                </span>
</div> 


</div >
</body>
</html>
